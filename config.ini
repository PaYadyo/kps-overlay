[server]
# Port this KPS server listens on (HTML overlay connects here)
port = 24051

# Tosu address
tosu_host = localhost:24050

[mania_keys]
# Keys for each key count - separate with commas
# Use: a-z, 0-9, space, shift, ctrl, alt, enter, bksp, tab, up, down, left, right, [ ] ; ' , . / ` - =
4k = d, f, j, k
5k = d, f, space, j, k
6k = s, d, f, j, k, l
7k = s, d, f, space, j, k, l
8k = a, s, d, f, j, k, l, ;
9k = a, s, d, f, space, j, k, l, ;

[timing]
# KPS rolling window in milliseconds
window_ms = 1000
# How often to broadcast to HTML overlay in milliseconds
broadcast_ms = 40
# Only count KPS while in gameplay (true/false)
only_in_play = true

[opacity]
min_opacity = 0.08
max_opacity = 1.0
